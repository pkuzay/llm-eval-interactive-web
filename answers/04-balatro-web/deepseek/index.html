<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小丑牌 · Web 致敬版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Rubik:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<canvas id="bg"></canvas>
<div id="menu-screen" class="hidden">
  <div id="menu-fan"></div>
  <div id="menu-title"></div>
  <div id="menu-sub">Web 致敬版 · 学习项目 · 原创实现</div>
  <div id="menu-btns">
    <button id="btn-menu-start" class="btn blue big">开 始 游 戏</button>
    <button id="btn-menu-handbook" class="btn orange big">牌 型 表</button>
  </div>
  <div id="menu-hint">选中最多 5 张牌打出牌型 · 小丑牌提供连锁加成 · 击败 8 层底注</div>
</div>
<div id="game">
  <aside id="sidebar">
    <div class="panel" id="blind-panel">
      <div id="blind-name">欢迎</div>
      <div id="blind-desc"></div>
      <div id="blind-req-row">
        <span class="chip-icon"></span>
        <span id="blind-req">-</span>
      </div>
      <div id="blind-reward"></div>
    </div>
    <div class="panel" id="score-panel">
      <div class="label">回合分数</div>
      <div id="round-score">0</div>
    </div>
    <div class="panel" id="hand-panel">
      <div id="hand-name">-</div>
      <div id="calc-row">
        <div id="chips-box">0</div>
        <div id="calc-x">×</div>
        <div id="mult-box">0</div>
      </div>
    </div>
    <div class="stat-grid">
      <div class="stat blue"><span>出牌</span><b id="hands-left">0</b></div>
      <div class="stat red"><span>弃牌</span><b id="discards-left">0</b></div>
    </div>
    <div class="panel" id="money-panel"><span id="money">$0</span></div>
    <div class="stat-grid">
      <div class="stat orange"><span>底注</span><b id="ante">1/8</b></div>
      <div class="stat gray"><span>回合</span><b id="round">0</b></div>
    </div>
    <button id="btn-handbook" class="mini-btn wide">牌 型 表</button>
  </aside>

  <main id="table">
    <div id="top-row">
      <div class="cardrow" id="jokers-row">
        <div class="row-cards" id="jokers"></div>
        <div class="row-label">小丑牌 <span id="joker-count">0/5</span></div>
      </div>
      <div class="cardrow" id="cons-row">
        <div class="row-cards" id="consumables"></div>
        <div class="row-label">消耗牌 <span id="cons-count">0/2</span></div>
      </div>
    </div>
    <div id="played"></div>
    <div id="hand"></div>
    <div id="controls">
      <button id="btn-play" class="btn blue big" disabled>出 牌</button>
      <div id="sort-box">
        <span>排序</span>
        <div>
          <button id="sort-rank" class="mini-btn">点数</button>
          <button id="sort-suit" class="mini-btn">花色</button>
        </div>
      </div>
      <button id="btn-discard" class="btn red big" disabled>弃 牌</button>
    </div>
    <div id="deck-pile">
      <div class="deck-back b3"></div>
      <div class="deck-back b2"></div>
      <div class="deck-back b1"></div>
      <span id="deck-count">52/52</span>
    </div>
    <div id="overlay" class="hidden"></div>
  </main>
</div>
<div id="popups"></div>
<div id="tooltip" class="hidden"></div>
<script src="js/audio.js"></script>
<script src="js/bg.js"></script>
<script src="js/data.js"></script>
<script src="js/poker.js"></script>
<script src="js/fx.js"></script>
<script src="js/main.js"></script>
</body>
</html>
