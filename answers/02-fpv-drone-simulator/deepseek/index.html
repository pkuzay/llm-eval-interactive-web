<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';

import { ShaderPass }     from 'three/addons/postprocessing/ShaderPass.js';

/* ============================================================
 *  配置参数
 * ============================================================ */
const CFG = {
  mass        : 0.65,                    // kg (5寸机+电池)
  gravity     : 9.81,
  maxThrust   : 38.0,                    // N, 4电机总推力 (推重比 ~6)
  inertia     : new THREE.Vector3(0.0075, 0.010, 0.0075), // kg·m² (x,y,z 体轴)
  dragK       : 0.0055,                  // 二次空气阻尼系数 F=-k|v|v
  dragLin     : 0.05,                    // 线性阻尼
  angDamp     : 0.015,                   // 气动角阻尼力矩系数
  rateRP      : THREE.MathUtils.degToRad(760), // 最大俯仰/横滚角速度
  rateY       : THREE.MathUtils.degToRad(560), // 最大偏航角速度
  expo        : 0.35,                    // 摇杆指数曲线
  pid : {
    kp: new THREE.Vector3(0.34, 0.30, 0.34),
    ki: new THREE.Vector3(1.60, 1.40, 1.60),
    kd: new THREE.Vector3(0.0035, 0.0020, 0.0035),
    iMax: 0.35,                          // 积分限幅 (N·m)
    tMax: new THREE.Vector3(1.8, 0.9, 1.8) // 力矩限幅 (N·m)
  },

CFG.cells = 4; CFG.soundPitch = 1; CFG.power = 'real'; CFG.mode = 'acro';

/* ============================================================
 *  机型 / 飞控 / 动力 预设
 * ============================================================ */
const CRAFT_PRESETS = {

  race5:      { name: '5寸竞速 (6S)',   mass: 0.58,  maxThrust: 54,  inertia: [0.0060, 0.008, 0.0060],    dragK: 0.0046, cells: 6, soundPitch: 1.15 },
  toothpick3: { name: '3寸牙签 (2S)',   mass: 0.18,  maxThrust: 8.5, inertia: [0.0012, 0.0016, 0.0012],   dragK: 0.0035, cells: 2, soundPitch: 1.7 },
  whoop:      { name: '涵道 Whoop (1S)', mass: 0.085, maxThrust: 2.6, inertia: [0.00035, 0.0005, 0.00035], dragK: 0.0060, cells: 1, soundPitch: 2.3 }
};
const FC_PROFILES = {
  bf:   { name: 'Betaflight 标准', kp: [0.34, 0.30, 0.34], ki: [1.6, 1.4, 1.6], kd: [0.0035, 0.0020, 0.0035], rateRP: 760, rateY: 560, expo: 0.35 },
  race: { name: 'Race 紧致',       kp: [0.42, 0.36, 0.42], ki: [2.2, 1.8, 2.2], kd: [0.0045, 0.0025, 0.0045], rateRP: 980, rateY: 720, expo: 0.25 },
  cine: { name: 'Cinematic 柔和',  kp: [0.28, 0.26, 0.28], ki: [1.2, 1.1, 1.2], kd: [0.0030, 0.0020, 0.0030], rateRP: 420, rateY: 300, expo: 0.55 }
};

/* ============================================================
 *  设置 (localStorage 持久化)
 * ============================================================ */
const SETTINGS_KEY = 'fpvsim_settings_v1';
const DEFAULT_SETTINGS = {
  axes: {
    roll:     { axis: 0, invert: false },
    pitch:    { axis: 1, invert: true  },
    throttle: { axis: 2, invert: true  },
    yaw:      { axis: 3, invert: false }
  },
  btnArm: 0, btnReset: 1,
  craft: 'freestyle5', fc: 'bf', power: 'real', mode: 'acro',
  camTilt: 28, camFov: 105, vtxRange: 420, volume: 50, audioPos: 'onboard'
};
function loadSettings() {
  const d = JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
  try {
    const s = JSON.parse(localStorage.getItem(SETTINGS_KEY));
    if (s) {
      for (const k in d) if (k !== 'axes' && s[k] !== undefined) d[k] = s[k];
      if (s.axes) for (const ch in d.axes) if (s.axes[ch]) Object.assign(d.axes[ch], s.axes[ch]);
    }
  } catch (e) {}
  return d;
}
let SETTINGS = loadSettings();
function saveSettings() {
  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(SETTINGS)); } catch (e) {}
}

/* ============================================================
 *  SO(3) 李群 / so(3) 李代数 工具
 *  R_{t+dt} = R_t · exp( hat(ω_body) · dt )   (Rodrigues 闭式解)
 * ============================================================ */
function expSO3(w, dt, out) {
  const wx = w.x * dt, wy = w.y * dt, wz = w.z * dt;
  const theta = Math.sqrt(wx * wx + wy * wy + wz * wz);
  if (theta < 1e-10) {          // 一阶近似 I + hat(ω dt)
    out.set(1, -wz, wy,  wz, 1, -wx,  -wy, wx, 1);
    return out;
  }
  const x = wx / theta, y = wy / theta, z = wz / theta;
  const c = Math.cos(theta), s = Math.sin(theta), C = 1 - c;
  out.set(
    c + x * x * C,     x * y * C - z * s, x * z * C + y * s,
    y * x * C + z * s, c + y * y * C,     y * z * C - x * s,
    z * x * C - y * s, z * y * C + x * s, c + z * z * C
  );
  return out;
}

// Gram-Schmidt 重正交化, 抑制浮点漂移使 R 保持在 SO(3) 流形上
const _c0 = new THREE.Vector3(), _c1 = new THREE.Vector3(), _c2 = new THREE.Vector3();
function orthonormalize(R) {
  const e = R.elements; // 列主序
  _c0.set(e[0], e[1], e[2]).normalize();
  _c1.set(e[3], e[4], e[5]);
  _c1.addScaledVector(_c0, -_c0.dot(_c1)).normalize();
  _c2.crossVectors(_c0, _c1);
  e[0] = _c0.x; e[1] = _c0.y; e[2] = _c0.z;
  e[3] = _c1.x; e[4] = _c1.y; e[5] = _c1.z;
  e[6] = _c2.x; e[7] = _c2.y; e[8] = _c2.z;
}

function expoCurve(x, e) { return x * (1 - e) + x * x * x * e; }

/* ============================================================
 *  刚体动力学 + Acro 模式三轴角速度 PID 飞控
 * ============================================================ */
class Drone {
  constructor() {
    this.pos = new THREE.Vector3();
    this.vel = new THREE.Vector3();
    this.R   = new THREE.Matrix3();     // 姿态 ∈ SO(3), 体轴→世界
    this.w   = new THREE.Vector3();     // 体轴角速度 rad/s
    this.integ = new THREE.Vector3();   // PID 积分项
    this.prevW = new THREE.Vector3();   // 上一步角速度 (D on measurement)
    this.armed = false;
    this.crashed = false;
    this.failsafe = false;
    this.throttle = 0;
    this._dR  = new THREE.Matrix3();
    this._tmp = new THREE.Matrix3();
    this._v   = new THREE.Vector3();
    this._f   = new THREE.Vector3();
    this._tau = new THREE.Vector3();
    this._orthoCounter = 0;
    this.reset();
  }

  reset() {
    this.pos.set(0, 0.10, 8);
    this.vel.set(0, 0, 0);
    this.R.identity();
    this.w.set(0, 0, 0);
    this.integ.set(0, 0, 0);
    this.prevW.set(0, 0, 0);
    this.crashed = false;
    this.failsafe = false;
    this.armed = false;
    this.throttle = 0;
    this.motor = 0;                     // 电机一阶滞后状态 (归一化)
    this.motors = [0, 0, 0, 0];         // 四电机混控输出 (声音模拟)
    this.batUsed = 0;                   // 电池消耗比例
    this.vbat = 4.2 * CFG.cells;
  }

  step(dt, input) {
    const active = this.armed && !this.crashed && !this.failsafe;
    const thr = active ? input.throttle : 0;
    this.throttle = thr;

    /* ---- 1. 摇杆 → 目标角速度 (Acro 纯角速度 / Angle 自稳) ---- */
    // 体轴: +X 右, +Y 上, -Z 前
    const tgt = this._v;
    if (!active) tgt.set(0, 0, 0);
    else if (CFG.mode === 'angle') {
      // Angle: 摇杆映射目标倾角, 外环 P 产生期望角速度; 偏航保持角速度控制
      const maxA = 0.9;                                  // 最大倾角 ~52°
      const pA = expoCurve(input.pitch, CFG.expo) * maxA;
      const rA = expoCurve(input.roll,  CFG.expo) * maxA;
      const e = this.R.elements;
      let fx = -e[6], fz = -e[8];                        // 前向水平投影
      let fl = Math.hypot(fx, fz);
      if (fl < 1e-3) { fx = e[0]; fz = e[2]; fl = Math.hypot(fx, fz) || 1; }
      fx /= fl; fz /= fl;
      const dU = _c1.set(fx * Math.tan(pA) - fz * Math.tan(rA), 1,
                         fz * Math.tan(pA) + fx * Math.tan(rA)).normalize(); // 期望机体 up
      const cU = _c2.set(e[3], e[4], e[5]);              // 当前机体 up
      const errW = _c0.crossVectors(cU, dU);             // 姿态误差轴 (世界系)
      const kA = 9.0;
      tgt.set(
        THREE.MathUtils.clamp(kA * (e[0] * errW.x + e[1] * errW.y + e[2] * errW.z), -CFG.rateRP, CFG.rateRP),
        -expoCurve(input.yaw, CFG.expo) * CFG.rateY,
        THREE.MathUtils.clamp(kA * (e[6] * errW.x + e[7] * errW.y + e[8] * errW.z), -CFG.rateRP, CFG.rateRP)
      );
    } else {
      tgt.set(
        -expoCurve(input.pitch, CFG.expo) * CFG.rateRP,  // 俯仰: 推杆低头
        -expoCurve(input.yaw,   CFG.expo) * CFG.rateY,   // 偏航: 右杆右转
        -expoCurve(input.roll,  CFG.expo) * CFG.rateRP   // 横滚: 右杆右滚
      );
    }

    /* ---- 2. 三轴角速度 PID → 虚拟力矩 τ ---- */
    const P = CFG.pid, tau = this._tau, w = this.w;
    const ex = tgt.x - w.x, ey = tgt.y - w.y, ez = tgt.z - w.z;
    if (active && thr > 0.05) {
      this.integ.x = THREE.MathUtils.clamp(this.integ.x + ex * dt * P.ki.x, -P.iMax, P.iMax);
      this.integ.y = THREE.MathUtils.clamp(this.integ.y + ey * dt * P.ki.y, -P.iMax, P.iMax);
      this.integ.z = THREE.MathUtils.clamp(this.integ.z + ez * dt * P.ki.z, -P.iMax, P.iMax);
    } else this.integ.multiplyScalar(0.95); // 怠速时积分泄放
    const dx = -(w.x - this.prevW.x) / dt, dy = -(w.y - this.prevW.y) / dt, dz = -(w.z - this.prevW.z) / dt;
    this.prevW.copy(w);
    tau.set(
      THREE.MathUtils.clamp(P.kp.x * ex + this.integ.x + P.kd.x * dx, -P.tMax.x, P.tMax.x),
      THREE.MathUtils.clamp(P.kp.y * ey + this.integ.y + P.kd.y * dy, -P.tMax.y, P.tMax.y),
      THREE.MathUtils.clamp(P.kp.z * ez + this.integ.z + P.kd.z * dz, -P.tMax.z, P.tMax.z)
    );
    if (!active) tau.set(0, 0, 0);

    /* ---- 3. 欧拉刚体方程: ω̇ = I⁻¹( τ + τ_aero − ω × Iω ) ---- */
    const I = CFG.inertia;
    const Iw = this._f.set(I.x * w.x, I.y * w.y, I.z * w.z);
    const gyro = _c0.crossVectors(w, Iw); // ω × Iω
    w.x += (tau.x - CFG.angDamp * w.x - gyro.x) / I.x * dt;
    w.y += (tau.y - CFG.angDamp * w.y - gyro.y) / I.y * dt;
    w.z += (tau.z - CFG.angDamp * w.z - gyro.z) / I.z * dt;

    /* ---- 4. SO(3) 指数映射姿态积分 ---- */
    expSO3(w, dt, this._dR);
    this._tmp.multiplyMatrices(this.R, this._dR); // 体轴角速度 → 右乘
    this.R.copy(this._tmp);
    if (++this._orthoCounter >= 24) { orthonormalize(this.R); this._orthoCounter = 0; }

    /* ---- 5. 动力模型 + 平动动力学: 推力 + 重力 + 二次空气阻尼 ---- */
    let T;
    if (CFG.power === 'real') {
      this.motor += (thr - this.motor) * Math.min(1, dt / 0.055);   // 电机一阶滞后 τ≈55ms
      this.batUsed = Math.min(1, this.batUsed + Math.pow(this.motor, 1.5) * dt / 480);
      this.vbat = CFG.cells * (4.20 - 0.75 * this.batUsed - 0.35 * this.motor * (0.4 + 0.6 * this.batUsed));
      const sag = Math.max(0.55, 1 - 0.05 * this.motor - 0.18 * this.batUsed); // 电池压降掉推力
      T = CFG.maxThrust * Math.pow(this.motor, 1.55) * sag;         // 推力 ∝ 转速² 近似
    } else {
      this.motor = thr;                                             // 理想线性
      this.vbat = CFG.cells * 4.2;
      T = CFG.maxThrust * this.motor;
    }
    const up = this._v.set(0, 1, 0).applyMatrix3(this.R);
    const f  = this._f.copy(up).multiplyScalar(T);
    f.y -= CFG.mass * CFG.gravity;
    const spd = this.vel.length();
    f.addScaledVector(this.vel, -(CFG.dragK * spd + CFG.dragLin));
    this.vel.addScaledVector(f, dt / CFG.mass);
    this.pos.addScaledVector(this.vel, dt);

    /* ---- 6. 地面接触 / 坠毁 ---- */
    if (this.pos.y < 0.10) {
      const impact = this.vel.length();
      this.pos.y = 0.10;
      if (this.armed && impact > CFG.crashSpeed) {
        this.crashed = true;
        this.armed = false;
      }
      if (this.vel.y < 0) this.vel.y = 0;
      this.vel.x *= 0.94; this.vel.z *= 0.94;      // 地面摩擦
      this.w.multiplyScalar(0.90);
      if (this.crashed) { this.vel.multiplyScalar(0.8); }
    }

    /* ---- 7. 四电机混控输出 (仅用于桨叶声音模拟) ---- */
    const nP = tau.x / P.tMax.x, nY = tau.y / P.tMax.y, nR = tau.z / P.tMax.z;
    const mo = this.motor, cl = THREE.MathUtils.clamp;
    this.motors[0] = cl(mo + 0.25 * ( nP + nR + nY), 0, 1);
    this.motors[1] = cl(mo + 0.25 * ( nP - nR - nY), 0, 1);
    this.motors[2] = cl(mo + 0.25 * (-nP + nR - nY), 0, 1);
    this.motors[3] = cl(mo + 0.25 * (-nP - nR + nY), 0, 1);
  }
}

/* ============================================================
 *  输入: Web Gamepad API (OpenTX/EdgeTX USB HID) + 键盘回退
 * ============================================================ */
// 通道绑定 / 反向 / 按键映射均由 SETTINGS.axes 控制 (ESC 菜单可改)
const DEADBAND = 0.02;

const input = { roll: 0, pitch: 0, yaw: 0, throttle: 0, gamepad: false, name: '', rawAxes: null };
const keys = {};
let armToggleLatch = false, resetLatch = false;

addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Enter') toggleArm();
  if (e.code === 'KeyR') doReset();
  if (e.code === 'Escape') toggleMenu();
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
});
addEventListener('keyup', e => { keys[e.code] = false; });
addEventListener('gamepadconnected',    e => { input.name = e.gamepad.id; });
addEventListener('gamepaddisconnected', () => { input.name = ''; });

function readAxis(gp, map) {
  let v = gp.axes[map.axis] ?? 0;
  if (map.invert) v = -v;
  if (Math.abs(v) < DEADBAND) v = 0;
  return THREE.MathUtils.clamp(v, -1, 1);
}

let kbThrottle = 0;
function pollInput(dt) {
  const pads = navigator.getGamepads ? navigator.getGamepads() : [];
  let gp = null;
  for (const p of pads) if (p && p.connected && p.axes.length >= 4) { gp = p; break; }

  if (gp) {
    input.gamepad = true;
    input.name = gp.id;
    input.rawAxes = gp.axes;
    const A = SETTINGS.axes;
    input.roll  = readAxis(gp, A.roll);
    input.pitch = readAxis(gp, A.pitch);
    input.yaw   = readAxis(gp, A.yaw);
    let t = gp.axes[A.throttle.axis] ?? -1;
    if (A.throttle.invert) t = -t;
    input.throttle = THREE.MathUtils.clamp((t + 1) * 0.5, 0, 1);   // [-1,1] → [0,1]
    // 手柄按键: 解锁/上锁 与 复位 (菜单可改绑定)
    if (gp.buttons[SETTINGS.btnArm]?.pressed) { if (!armToggleLatch) { toggleArm(); armToggleLatch = true; } }
    else armToggleLatch = false;
    if (gp.buttons[SETTINGS.btnReset]?.pressed) { if (!resetLatch) { doReset(); resetLatch = true; } }
    else resetLatch = false;
  } else {
    input.gamepad = false;
    input.rawAxes = null;
    // 键盘回退: 带速率平滑, 模拟摇杆手感
    const rate = 5.0 * dt;
    const tgt = (p, m) => (keys[p] ? 1 : 0) - (keys[m] ? 1 : 0);
    input.pitch = approach(input.pitch, tgt('ArrowUp', 'ArrowDown'), rate);
    input.roll  = approach(input.roll,  tgt('ArrowRight', 'ArrowLeft'), rate);
    input.yaw   = approach(input.yaw,   tgt('KeyD', 'KeyA'), rate);
    kbThrottle  = THREE.MathUtils.clamp(kbThrottle + tgt('KeyW', 'KeyS') * 0.9 * dt, 0, 1);
    input.throttle = kbThrottle;
  }
}
function approach(cur, tgt, rate) {
  if (cur < tgt) return Math.min(cur + rate, tgt);
  if (cur > tgt) return Math.max(cur - rate, tgt);
  return cur;
}

function makeGrassTexture() {
  const S = 256, cv = document.createElement('canvas');
  cv.width = cv.height = S;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = '#4a7a2e'; ctx.fillRect(0, 0, S, S);
  for (let i = 0; i < 9000; i++) {
    const g = 90 + Math.random() * 80, r = 40 + Math.random() * 40;
    ctx.fillStyle = `rgb(${r|0},${g|0},${(30 + Math.random() * 30)|0})`;
    ctx.fillRect(Math.random() * S, Math.random() * S, 1 + Math.random() * 2, 1 + Math.random() * 3);
  }
  for (let i = 0; i < 60; i++) {   // 深色草簇
    ctx.fillStyle = 'rgba(30,60,20,0.35)';
    ctx.beginPath();
    ctx.arc(Math.random() * S, Math.random() * S, 4 + Math.random() * 10, 0, 7);
    ctx.fill();
  }
  const tex = new THREE.CanvasTexture(cv);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(320, 320);
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

/* ============================================================
 *  VTX 模拟图传衰弱后处理 (EffectComposer + 自定义 GLSL)
 *  信号 S = clamp(1 - D/Dmax): 雪花噪声 → 撕裂/滚动条纹 → 全雪花
 * ============================================================ */
const VTXShader = {
  uniforms: {
    tDiffuse:    { value: null },
    uTime:       { value: 0 },
    uSignal:     { value: 1 },
    uResolution: { value: new THREE.Vector2(innerWidth, innerHeight) }
  },
  vertexShader: `
    varying vec2 vUv;
    void main(){ vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float uTime, uSignal;
    uniform vec2 uResolution;
    varying vec2 vUv;

    float hash(vec2 p){
      p = fract(p * vec2(443.897, 441.423));
      p += dot(p, p.yx + 19.19);
      return fract((p.x + p.y) * p.x);
    }

    void main(){
      float s   = clamp(uSignal, 0.0, 1.0);
      float bad = 1.0 - s;
      vec2 uv = vUv;
      float frameT = floor(uTime * 60.0);

      /* --- 横向撕裂: 逐扫描行随机偏移, 信号越差越频繁越大 --- */
      float tearAmt = smoothstep(0.55, 0.10, s);
      float row  = floor(uv.y * uResolution.y / 3.0);
      float gate = step(1.0 - 0.55 * tearAmt, hash(vec2(row * 0.731, frameT * 0.517)));
      float tear = (hash(vec2(row, frameT)) - 0.5) * 0.55 * tearAmt * gate;
      /* 大块整幅撕裂 (间歇性) */
      float bigGate = step(1.0 - 0.25 * tearAmt, hash(vec2(frameT, 7.77)));
      float bigBand = step(hash(vec2(frameT, 3.3)), uv.y) * step(uv.y, hash(vec2(frameT, 3.3)) + 0.22);
      tear += bigGate * bigBand * (hash(vec2(frameT, 9.1)) - 0.5) * 0.8 * tearAmt;
      uv.x = fract(uv.x + tear);

      /* --- 不同步黑色滚动条纹 (rolling bands) --- */
      float roll1 = fract(uv.y * 1.35 + uTime * (0.35 + bad * 1.4));
      float roll2 = fract(uv.y * 0.6  - uTime * 0.9 + 0.37);
      float band = smoothstep(0.00, 0.10, roll1) * smoothstep(0.28, 0.14, roll1)
                 + 0.6 * smoothstep(0.0, 0.06, roll2) * smoothstep(0.16, 0.08, roll2);
      float bandAmt = smoothstep(0.5, 0.12, s);

      vec3 col = texture2D(tDiffuse, uv).rgb;

      /* --- 色彩饱和度衰减 (模拟信号劣化偏灰) --- */
      float lum = dot(col, vec3(0.299, 0.587, 0.114));
      col = mix(vec3(lum), col, mix(0.15, 1.0, smoothstep(0.05, 0.75, s)));

      /* --- 横向雪花纹: 行相关噪声 + 像素白噪声 --- */
      float noiseAmt = 0.035 + bad * bad * 1.1;
      float lineN  = hash(vec2(floor(uv.y * uResolution.y), frameT));      // 整行闪烁
      float pixN   = hash(uv * uResolution.xy + fract(uTime) * 1e3);       // 像素雪花
      float streak = step(0.985 - bad * 0.12, lineN);                      // 横向亮线
      col = mix(col, vec3(pixN), clamp(noiseAmt, 0.0, 1.0));
      col += streak * (pixN * 0.8 + 0.2) * (0.15 + bad * 0.6);

      /* --- 滚动暗条纹叠加 --- */
      col *= 1.0 - clamp(band, 0.0, 1.0) * bandAmt * 0.85;

      /* --- 彻底失联: 纯雪花屏 --- */
      float lost = smoothstep(0.045, 0.0, s);
      col = mix(col, vec3(pixN) * (0.75 + 0.25 * lineN), lost);

      /* --- 模拟 CVBS 观感: 轻微暗角 + 扫描线 --- */
      vec2 dc = vUv - 0.5;
      col *= 1.0 - dot(dc, dc) * 0.55;
      col *= 0.94 + 0.06 * sin(vUv.y * uResolution.y * 3.14159);

      gl_FragColor = vec4(col, 1.0);
    }`
};

/* ============================================================
 *  桨叶/电机声音模拟 (Web Audio)
 *  4 电机 × (锯齿基频 + 三倍谐波) + 带通白噪声桨叶风噪
 * ============================================================ */
class SoundEngine {
  constructor() { this.ctx = null; }
  init() {
    if (this.ctx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    const ctx = this.ctx = new AC();
    this.master = ctx.createGain();
    this.master.gain.value = 0;
    const comp = ctx.createDynamicsCompressor();
    this.master.connect(comp);
    comp.connect(ctx.destination);
    this.units = [];
    for (let i = 0; i < 4; i++) {
      const g = ctx.createGain(); g.gain.value = 0;
      const lp = ctx.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 2800; lp.Q.value = 0.6;
      g.connect(lp); lp.connect(this.master);
      const o1 = ctx.createOscillator(); o1.type = 'sawtooth'; o1.frequency.value = 60;
      const g1 = ctx.createGain(); g1.gain.value = 1.0;
      const o2 = ctx.createOscillator(); o2.type = 'triangle'; o2.frequency.value = 121;
      const g2 = ctx.createGain(); g2.gain.value = 0.55;
      o1.detune.value = (Math.random() - 0.5) * 16;   // 四电机轻微失谐 → 真实和声
      o2.detune.value = (Math.random() - 0.5) * 22;
      o1.connect(g1); g1.connect(g);
      o2.connect(g2); g2.connect(g);
      o1.start(); o2.start();
      this.units.push({ o1, o2, g });
    }
    const len = ctx.sampleRate * 2;
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
    const noise = ctx.createBufferSource();
    noise.buffer = buf; noise.loop = true;
    this.bp = ctx.createBiquadFilter();
    this.bp.type = 'bandpass'; this.bp.frequency.value = 900; this.bp.Q.value = 0.7;
    this.nGain = ctx.createGain(); this.nGain.gain.value = 0;
    noise.connect(this.bp); this.bp.connect(this.nGain); this.nGain.connect(this.master);
    noise.start();
  }
  update(motors, pitchScale, vol, speed) {
    if (!this.ctx || this.ctx.state !== 'running') return;
    const t = this.ctx.currentTime, k = 0.035;
    let avg = 0;
    for (let i = 0; i < 4; i++) {
      const m = motors[i]; avg += m * 0.25;
      const u = this.units[i];
      const f = (58 + 560 * m) * pitchScale;             // 转速 → 基频
      u.o1.frequency.setTargetAtTime(f, t, k);
      u.o2.frequency.setTargetAtTime(f * 2.03, t, k);
      u.g.gain.setTargetAtTime(0.085 * Math.pow(m, 1.35), t, k);
    }
    this.bp.frequency.setTargetAtTime(Math.min(9000, 500 + 4500 * avg * pitchScale), t, k);
    this.nGain.gain.setTargetAtTime(0.30 * avg * avg + 0.10 * Math.min(1, speed / 30), t, k);
    this.master.gain.setTargetAtTime(vol, t, 0.06);
  }
}
const sound = new SoundEngine();
function ensureAudio() {
  sound.init();
  if (sound.ctx && sound.ctx.state === 'suspended') sound.ctx.resume();
}
addEventListener('pointerdown', ensureAudio);
addEventListener('keydown', ensureAudio);

    Array.from({ length: 16 }, (_, i) => opt(i, '按键 ' + i, cur)).join('') + '</select>';
  menuEl.innerHTML = `<div class="panel">
    <h2>设置 <span id="menuClose" style="float:right;cursor:pointer">✕ ESC</span></h2>
    <div class="sec"><h3>通道绑定 (Gamepad)</h3>
      ${chRow('roll', '横滚')}${chRow('pitch', '俯仰')}${chRow('yaw', '偏航')}${chRow('throttle', '油门')}
      <div class="row"><b style="width:56px">解锁</b>${btnSel('btnArm', SETTINGS.btnArm)}
        <b>复位</b>${btnSel('btnReset', SETTINGS.btnReset)}</div>
      <div class="mon" id="axMon"></div>
    </div>
    <div class="sec"><h3>动力 / 飞控模型</h3>
      <div class="row">机型 ${sel('selCraft', Object.entries(CRAFT_PRESETS).map(([k, v]) => [k, v.name]), SETTINGS.craft)}
        动力模型 ${sel('selPower', [['ideal', '理想线性'], ['real', '真实 (电机滞后+推力曲线+电池压降)']], SETTINGS.power)}</div>
      <div class="row">飞控 PID ${sel('selFc', Object.entries(FC_PROFILES).map(([k, v]) => [k, v.name]), SETTINGS.fc)}
        飞行模式 ${sel('selMode', [['acro', 'Acro 手动'], ['angle', 'Angle 自稳']], SETTINGS.mode)}</div>
    </div>
    <div class="sec"><h3>相机 / 图传</h3>
      <div class="row">上仰 <input type="range" id="rngTilt" min="0" max="45" value="${SETTINGS.camTilt}"/><span id="valTilt"></span>
        FOV <input type="range" id="rngFov" min="75" max="140" value="${SETTINGS.camFov}"/><span id="valFov"></span></div>
      <div class="row">VTX 极限距离 <input type="range" id="rngVtx" min="100" max="800" step="20" value="${SETTINGS.vtxRange}"/><span id="valVtx"></span></div>
    </div>
    <div class="sec"><h3>声音</h3>
      <div class="row">音量 <input type="range" id="rngVol" min="0" max="100" value="${SETTINGS.volume}"/><span id="valVol"></span>
        听感位置 ${sel('selAudio', [['onboard', '机载 (FPV)'], ['ground', '地面站 (距离衰减)']], SETTINGS.audioPos)}</div>
    </div>
    <div class="sec row"><button id="btnDefaults">恢复默认</button><button id="btnCloseMenu">关闭 (ESC)</button></div>
  </div>`;
  syncLabels();
  document.getElementById('menuClose').onclick = toggleMenu;
  document.getElementById('btnCloseMenu').onclick = toggleMenu;
  document.getElementById('btnDefaults').onclick = () => {
    SETTINGS = JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
    saveSettings(); applySettings(); buildMenu();
  };
  menuEl.oninput = menuEl.onchange = onMenuChange;
}

function syncLabels() {
  const set = (id, txt) => { const n = document.getElementById(id); if (n) n.textContent = txt; };
  set('valTilt', SETTINGS.camTilt + '°');
  set('valFov', SETTINGS.camFov + '°');
  set('valVtx', SETTINGS.vtxRange + ' m');
  set('valVol', SETTINGS.volume + '%');
}

function onMenuChange(e) {
  const t = e.target, ds = t.dataset || {};
  if (ds.kind === 'axis') SETTINGS.axes[ds.ch].axis = +t.value;
  else if (ds.kind === 'inv') SETTINGS.axes[ds.ch].invert = t.checked;
  else switch (t.id) {
    case 'btnArm':   SETTINGS.btnArm   = +t.value; break;
    case 'btnReset': SETTINGS.btnReset = +t.value; break;
    case 'selCraft': SETTINGS.craft    = t.value; break;
    case 'selPower': SETTINGS.power    = t.value; break;
    case 'selFc':    SETTINGS.fc       = t.value; break;
    case 'selMode':  SETTINGS.mode     = t.value; break;
    case 'selAudio': SETTINGS.audioPos = t.value; break;
    case 'rngTilt':  SETTINGS.camTilt  = +t.value; break;
    case 'rngFov':   SETTINGS.camFov   = +t.value; break;
    case 'rngVtx':   SETTINGS.vtxRange = +t.value; break;
    case 'rngVol':   SETTINGS.volume   = +t.value; break;
    default: return;
  }
  applySettings(); saveSettings(); syncLabels();
}

function updateMenuLive() {
  for (const ch of ['roll', 'pitch', 'yaw', 'throttle']) {
    const v = ch === 'throttle' ? input.throttle * 2 - 1 : input[ch];
    const bar = document.getElementById('axb_' + ch);
    const num = document.getElementById('axn_' + ch);
    if (bar) bar.style.width = ((v + 1) * 50).toFixed(1) + '%';
    if (num) num.textContent = (v >= 0 ? '+' : '') + v.toFixed(2);
  }
  const mon = document.getElementById('axMon');
  if (mon) mon.textContent = input.rawAxes
    ? '原始轴值: ' + Array.from(input.rawAxes).map((v, i) => `[${i}] ${v.toFixed(2)}`).join('  ')
    : '未检测到遥控器 (键盘模式) — 连接后拨动摇杆以识别轴号';
}

/* ============================================================
 *  主循环: 固定步长物理积分 + 相机同步 + 信号/OSD
 * ============================================================ */
const drone = new Drone();
const HOME = new THREE.Vector3(0, 0, 8);   // 接收天线位置 (起飞点)

function toggleArm() {
  if (drone.crashed || drone.failsafe) return;
  if (!drone.armed && input.throttle > 0.12) return; // 油门未归零禁止解锁
  ensureAudio();
  drone.armed = !drone.armed;
}
function doReset() { drone.reset(); kbThrottle = 0; }

const _m4 = new THREE.Matrix4();
const _q  = new THREE.Quaternion();
const _XUP = new THREE.Vector3(1, 0, 0);
const _qt = new THREE.Quaternion().setFromAxisAngle(_XUP, CFG.camTilt);
function syncCamera() {
  camera.position.copy(drone.pos);
  _m4.setFromMatrix3(drone.R);
  _q.setFromRotationMatrix(_m4);
  camera.quaternion.copy(_q).multiply(_qt);   // FPV 相机上仰角
  skyMesh.position.copy(drone.pos);
}

/* ---- OSD DOM ---- */
const $ = id => document.getElementById(id);
const el = {
  rssiTxt: $('rssiTxt'), rssiBar: $('rssiBar'), distTxt: $('distTxt'),
  altTxt: $('altTxt'), spdTxt: $('spdTxt'), thrTxt: $('thrTxt'),
  thrBar: $('thrBar'), gpTxt: $('gpTxt'), msgTxt: $('msgTxt'), batTxt: $('batTxt')
};
function updateOSD(signal, dist) {
  el.rssiTxt.textContent = Math.round(-40 - (1 - signal) * 60) + ' dBm';
  el.rssiBar.style.width = (signal * 100).toFixed(0) + '%';
  el.rssiBar.style.background = signal > 0.4 ? '#aaffaa' : (signal > 0.15 ? '#ffd54f' : '#ff5252');
  el.distTxt.textContent = dist.toFixed(0);
  el.altTxt.textContent  = drone.pos.y.toFixed(1);
  el.spdTxt.textContent  = (drone.vel.length() * 3.6).toFixed(0);
  el.batTxt.textContent  = drone.vbat.toFixed(1);
  el.batTxt.style.color  = drone.vbat < 3.55 * CFG.cells ? '#ff5252' : '';
  el.thrTxt.textContent  = Math.round(input.throttle * 100);
  el.thrBar.style.width  = (input.throttle * 100).toFixed(0) + '%';
  el.gpTxt.textContent = input.gamepad ? ('TX: ' + input.name.slice(0, 40)) : '未检测到遥控器 — 使用键盘模式';

  if (drone.failsafe)
    el.msgTxt.innerHTML = 'FAILSAFE<div class="sub">图传信号丢失 — 按 R 复位</div>';
  else if (drone.crashed)
    el.msgTxt.innerHTML = 'CRASHED<div class="sub">按 R / 手柄按键1 复位</div>';
  else if (!drone.armed)
    el.msgTxt.innerHTML = 'DISARMED<div class="sub">油门归零后按 ENTER / 手柄按键0 解锁</div>';
  else
    el.msgTxt.innerHTML = '';
}

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
  vtxPass.uniforms.uResolution.value.set(innerWidth, innerHeight);
});

/* ---- 固定步长积分主循环 ---- */
applySettings();
const PHYS_DT = 1 / CFG.physHz;
let last = performance.now(), acc = 0, elapsed = 0;

function loop(now) {
  requestAnimationFrame(loop);
  let dt = (now - last) / 1000;
  last = now;
  dt = Math.min(dt, 0.1);           // 切后台保护
  elapsed += dt;

  pollInput(dt);

  acc += dt;
  while (acc >= PHYS_DT) {
    drone.step(PHYS_DT, input);
    acc -= PHYS_DT;
  }

  /* 信号强度: 与距离成反比, 超出极限距离触发失控保护 (电机断电) */
  const dist = drone.pos.distanceTo(HOME);
  const signal = THREE.MathUtils.clamp(1 - dist / CFG.vtxRange, 0, 1);
  if (dist > CFG.vtxRange && !drone.failsafe) {
    drone.failsafe = true;          // 彻底失联: 失去推力坠毁
    drone.armed = false;
  }

  syncCamera();
  vtxPass.uniforms.uTime.value   = elapsed;
  vtxPass.uniforms.uSignal.value = drone.failsafe ? 0 : signal;

  /* 桨叶声音: 机载恒定 / 地面站按距离衰减 */
  const distAtt = SETTINGS.audioPos === 'ground' ? 1 / (1 + Math.pow(dist / 18, 1.8)) : 1;
  sound.update(drone.motors, CFG.soundPitch, (SETTINGS.volume / 100) * distAtt, drone.vel.length());

  updateOSD(signal, dist);
  if (menuOpen) updateMenuLive();
  composer.render();
}
requestAnimationFrame(loop);

</script>
</body>
</html>
